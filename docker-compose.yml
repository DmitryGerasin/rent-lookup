# Copy docker/env.example to .env and fill values before `docker compose up`.
#
# TLS: Let’s Encrypt on the host at /etc/letsencrypt; HTTP-01 webroot docker/certbot/www.
# Nginx vhost: HOSTNAME, NODE_PORT, NGINX_APP_HOST (see docker/env.example).
# See docker/README.md.

services:
  mysql:
    image: mysql:8.4
    container_name: real-estate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-realestate}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/00-require-mysql-env.sh:/docker-entrypoint-initdb.d/00-require-mysql-env.sh:ro
      - ./config/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/mysql/02-app-user.sh:/docker-entrypoint-initdb.d/02-app-user.sh:ro
      - ./docker/mysql/conf.d/realestate.cnf:/etc/mysql/conf.d/realestate.cnf:ro
    networks:
      - internal
    healthcheck:
      # test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      # Password from container env (avoid compose-time interpolation issues with special chars)
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      # First-time datadir init can be slow on small VPS; avoids marking unhealthy too early
      start_period: 180s

  app:
    build: .
    container_name: real-estate-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HTTP_BIND_ADDRESS: "0.0.0.0"
      NODE_PORT: ${NODE_PORT}
      # IP whitelist: nginx connects from Docker bridge, not 127.0.0.1 (override via .env if needed).
      APP_BEHIND_DOCKER_PROXY: ${APP_BEHIND_DOCKER_PROXY:-true}
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-realestate}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: real-estate-nginx
    restart: unless-stopped
    environment:
      # Substituted into vhost/realestate.conf.tmpl (not full .env).
      NGINX_DOMAIN: ${HOSTNAME}
      NODE_PORT: ${NODE_PORT}
      NGINX_APP_HOST: ${NGINX_APP_HOST:-app}
    # No /docker-entrypoint.sh: on small hosts the stock entrypoint scripts add little value and
    # can make the container harder to reason about. sed → conf.d, nginx -t, then nginx in foreground.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        rm -f /etc/nginx/conf.d/default.conf
        sed -e "s|@DOMAIN@|$$NGINX_DOMAIN|g" -e "s|@APP_HOST@|$$NGINX_APP_HOST|g" -e "s|@APP_PORT@|$$NODE_PORT|g" /etc/nginx/realestate.conf.tmpl > /etc/nginx/conf.d/realestate.conf
        nginx -t
        exec nginx -g 'daemon off;'
    # Bind IPv4 only: avoids `failed to bind host port [::]:80` when something else holds IPv6 :80,
    # which can leave the container running with no published ports after a partial create.
    ports:
      - "0.0.0.0:80:80/tcp"
      - "0.0.0.0:443:443/tcp"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/vhost/realestate.conf.tmpl:/etc/nginx/realestate.conf.tmpl:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/nginx-errors:/var/www/nginx-errors:ro
      - ./docker/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
