# Copy docker/env.example to .env and fill values before `docker compose up`.
#
# TLS: Let’s Encrypt on the host at /etc/letsencrypt; HTTP-01 webroot docker/certbot/www.
# Public hostnames and upstream port come from .env (HOSTNAME, NODE_PORT) via nginx templates.
# See docker/README.md.

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: realestate
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/mysql/02-app-user.sh:/docker-entrypoint-initdb.d/02-app-user.sh:ro
      - ./docker/mysql/conf.d/realestate.cnf:/etc/mysql/conf.d/realestate.cnf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HTTP_BIND_ADDRESS: "0.0.0.0"
      NODE_PORT: ${NODE_PORT}
      MYSQL_HOST: mysql
      MYSQL_USER: app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: realestate
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      # Render docker/nginx/vhost/realestate.in → conf.d (do not mount full .env here).
      NGINX_DOMAIN: ${HOSTNAME}
      NODE_PORT: ${NODE_PORT}
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /etc/nginx/conf.d/default.conf
        sed -e "s|@DOMAIN@|$$NGINX_DOMAIN|g" -e "s|@APP_PORT@|$$NODE_PORT|g" /etc/nginx/realestate.in > /etc/nginx/conf.d/realestate.conf
        exec /docker-entrypoint.sh nginx -g 'daemon off;'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/vhost/realestate.in:/etc/nginx/realestate.in:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/nginx-errors:/var/www/nginx-errors:ro
      - ./docker/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
