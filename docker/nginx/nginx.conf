# Main config for nginx:1.x-alpine (Docker). Debian paths/users differ.

user nginx;
# Single worker keeps RAM predictable on small droplets (raise if you need more throughput).
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
   worker_connections 768;
}

http {

   ##
   # Basic Settings
   ##

   sendfile on;
   tcp_nopush on;
   tcp_nodelay on;
   keepalive_timeout 65;
   types_hash_max_size 2048;
   server_tokens off;

   server_names_hash_bucket_size 64;

   # Docker’s embedded DNS — required for `server … resolve` upstreams so nginx starts
   # before `app` is reachable and re-resolves when containers restart.
   resolver 127.0.0.11 valid=10s ipv6=off;

   include /etc/nginx/mime.types;
   default_type application/octet-stream;

   ##
   # SSL Settings
   ##

   ssl_protocols TLSv1.2 TLSv1.3;
   ssl_prefer_server_ciphers off;

   ##
   # Logging Settings
   ##

   access_log /var/log/nginx/access.log;
   error_log /var/log/nginx/error.log;

   ##
   # Gzip Settings
   ##

   gzip on;

   ##
   # Virtual Host Configs
   ##

   include /etc/nginx/conf.d/*.conf;
   include /etc/nginx/sites-enabled/*;
}
