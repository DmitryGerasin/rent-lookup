# /etc/nginx/sites-enabled/reject-ip-requests.conf

##
# Purpose of this block:
# This server block exists ONLY to handle requests made directly to the IP address of the server
# (e.g. http://123.123.123.123 or https://123.123.123.123).
#
# In such cases, Nginx otherwise serves the default "Welcome to nginx!" page, which is bad practice.
# This block instead terminates those requests immediately using "return 444;", meaning:
# - No response is sent
# - The TCP connection is closed
# - No app is touched, nothing is proxied or parsed
#
# This improves security posture by removing unintentional surface area.
# This block should NEVER be used to serve content.
##
server {
   # Listen on HTTP as default fallback
   listen 80 default_server;
   listen [::]:80 default_server;

   # Matches any unmatched request (like requests to the server's IP)
   server_name _;

   # Do not log anything for these requests — avoids log noise from bots/scanners
   access_log off;
   error_log /dev/null crit;

   # Drop the connection silently without any response
   return 444;
}

server {
   # Listen on HTTPS as default fallback
   listen 443 ssl default_server;
   listen [::]:443 ssl default_server;

   # Matches any unmatched request (like requests to the server's IP)
   server_name _;

   # Do not log anything for these requests — avoids log noise from bots/scanners
   access_log off;
   error_log /dev/null crit;

   # Reject the handshake immediately if SNI doesn't match a valid server block.
   # This removes the need for dummy certificates.
   ssl_reject_handshake on; # Only available in Nginx v1.19+

   # Drop the connection silently without any response
   return 444;
}

